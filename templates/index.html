<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카드뉴스 메이커</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }

  header {
    background: #1a1a2e;
    color: #fff;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  header span { font-size: 13px; color: #aaa; }

  .layout {
    display: grid;
    grid-template-columns: 440px 1fr;
    height: calc(100vh - 56px);
    overflow: hidden;
  }

  /* 왼쪽 패널 */
  .panel-left {
    background: #fff;
    border-right: 1px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-left-inner {
    overflow-y: auto;
    padding: 20px;
    flex: 1;
  }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-bottom: 10px;
  }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #444; }
  input[type=text], textarea, select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    background: #fafafa;
    transition: border-color .15s;
  }
  input[type=text]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: #4f7df3;
    background: #fff;
  }
  textarea { resize: vertical; min-height: 64px; }

  /* 카드 아이템 */
  .cards-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .card-item {
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    background: #fafafa;
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    cursor: pointer;
    gap: 8px;
    background: #f5f5f5;
  }
  .card-header:hover { background: #ececec; }
  .card-num {
    width: 22px; height: 22px;
    background: #1a1a2e;
    color: #fff;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-type-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: #e8eeff;
    color: #4f7df3;
    font-weight: 600;
  }
  .card-title-preview { font-size: 12px; color: #666; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card-del {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: 16px; padding: 0 4px;
    flex-shrink: 0;
  }
  .card-del:hover { color: #e55; }
  .card-body { padding: 12px; display: none; border-top: 1px solid #e0e0e0; }
  .card-body.open { display: block; }

  /* 하위 폼 그룹 */
  .sub-group { margin-bottom: 10px; }
  .sub-group label { font-size: 12px; color: #666; font-weight: 500; }

  /* stat 행 */
  .stat-rows { display: flex; flex-direction: column; gap: 6px; }
  .stat-row { display: flex; gap: 6px; }
  .stat-row input { flex: 1; }
  .stat-row .del-stat { background: none; border: none; cursor: pointer; color: #ccc; font-size: 18px; }
  .stat-row .del-stat:hover { color: #e55; }
  .btn-add-stat { font-size: 12px; color: #4f7df3; background: none; border: 1px solid #c8d8ff; border-radius: 5px; padding: 4px 10px; cursor: pointer; margin-top: 4px; }
  .btn-add-stat:hover { background: #eef2ff; }

  /* 버튼들 */
  .btn-add-card {
    width: 100%;
    padding: 10px;
    border: 2px dashed #c8d8ff;
    border-radius: 8px;
    background: none;
    color: #4f7df3;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    margin-bottom: 8px;
  }
  .btn-add-card:hover { background: #eef2ff; }

  .panel-left-footer { padding: 16px 20px; border-top: 1px solid #eee; background: #fff; }
  .btn-generate {
    width: 100%;
    padding: 13px;
    background: #4f7df3;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s;
  }
  .btn-generate:hover { background: #3a68dd; }
  .btn-generate:disabled { background: #b0c0f0; cursor: not-allowed; }

  /* 오른쪽 패널 */
  .panel-right {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #f0f2f5;
  }
  .panel-right-header {
    padding: 16px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f0f2f5;
    border-bottom: 1px solid #e0e0e0;
    flex-shrink: 0;
  }
  .panel-right-header h2 { font-size: 14px; font-weight: 700; color: #444; }
  .result-count { font-size: 12px; color: #888; }

  .btn-download {
    padding: 8px 18px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: none;
  }
  .btn-download:hover { background: #2d2d50; }
  .btn-download.visible { display: block; }

  .preview-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .preview-card {
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .preview-card img { width: 100%; display: block; }
  .preview-card-label { padding: 6px 10px; font-size: 11px; color: #888; text-align: center; }

  /* 빈 상태 */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #bbb;
    gap: 10px;
  }
  .empty-state svg { width: 56px; height: 56px; }
  .empty-state p { font-size: 14px; }

  /* 로딩 */
  .loading {
    display: none;
    align-items: center;
    justify-content: center;
    height: 100%;
    flex-direction: column;
    gap: 14px;
    color: #888;
  }
  .loading.active { display: flex; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e0e0e0;
    border-top-color: #4f7df3;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .divider { height: 1px; background: #eee; margin: 16px 0; }
</style>
</head>
<body>

<header>
  <h1>카드뉴스 메이커</h1>
  <span>POPUP STUDIO AI</span>
</header>

<div class="layout">

  <!-- 왼쪽: 입력 폼 -->
  <div class="panel-left">
    <div class="panel-left-inner">

      <div class="section-title">기본 정보</div>
      <div class="form-group">
        <label>제목 (시리즈명)</label>
        <input type="text" id="title" placeholder="예: AI가 바꾸는 콘텐츠 마케팅" value="AI가 바꾸는 콘텐츠 마케팅">
      </div>
      <div class="form-group">
        <label>테마</label>
        <select id="theme">
          <option value="blue">blue</option>
          <option value="coral">coral</option>
          <option value="green">green</option>
          <option value="purple">purple</option>
          <option value="dark">dark</option>
          <option value="white">white</option>
        </select>
      </div>
      <div class="form-group">
        <label>브랜드명 (선택)</label>
        <input type="text" id="brand" placeholder="예: POPUP STUDIO AI" value="POPUP STUDIO AI">
      </div>

      <div class="divider"></div>
      <div class="section-title">카드 목록</div>

      <div class="cards-list" id="cardsList"></div>

      <button class="btn-add-card" onclick="addCard()">+ 카드 추가</button>

    </div>
    <div class="panel-left-footer">
      <button class="btn-generate" id="btnGenerate" onclick="generate()">생성하기</button>
    </div>
  </div>

  <!-- 오른쪽: 미리보기 -->
  <div class="panel-right">
    <div class="panel-right-header">
      <div>
        <h2>미리보기</h2>
        <span class="result-count" id="resultCount"></span>
      </div>
      <button class="btn-download" id="btnDownload" onclick="downloadZip()">ZIP 다운로드</button>
    </div>
    <div class="preview-area" id="previewArea">
      <div class="empty-state" id="emptyState">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M9 3v18"/>
        </svg>
        <p>왼쪽에서 카드 내용을 입력하고<br>생성하기를 누르세요</p>
      </div>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>카드 생성 중...</p>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </div>
  </div>

</div>

<script>
// 카드 타입별 필드 정의
const CARD_FIELDS = {
  cover: [
    { key: 'series', label: '시리즈명', type: 'text', placeholder: '예: MARKETING TREND 2026' },
    { key: 'title',  label: '제목',    type: 'text', placeholder: '예: AI가 바꾸는\n콘텐츠 마케팅' },
    { key: 'subtitle', label: '부제',  type: 'text', placeholder: '예: 당신의 마케팅이 달라져야 하는 이유' },
  ],
  content: [
    { key: 'title',  label: '제목', type: 'text', placeholder: '카드 제목' },
    { key: 'tags',   label: '태그 (쉼표 구분)', type: 'text', placeholder: '예: AI, 마케팅, 트렌드' },
    { key: 'body',   label: '본문', type: 'textarea', placeholder: '설명 텍스트...' },
    { key: 'points', label: '핵심 포인트 (줄바꿈으로 구분)', type: 'textarea', placeholder: '포인트1\n포인트2\n포인트3' },
  ],
  stat: [
    { key: 'title', label: '제목', type: 'text', placeholder: '통계 카드 제목' },
    { key: 'stats', label: '통계 항목', type: 'stats' },
  ],
  list: [
    { key: 'title', label: '제목', type: 'text', placeholder: '목록 카드 제목' },
    { key: 'items', label: '항목 (줄바꿈으로 구분)', type: 'textarea', placeholder: '항목1\n항목2\n항목3' },
  ],
  quote: [
    { key: 'text',   label: '인용문', type: 'textarea', placeholder: '인용 텍스트...' },
    { key: 'source', label: '출처',   type: 'text', placeholder: '예: — 홍길동, CEO' },
  ],
  end: [
    { key: 'title', label: '제목', type: 'text', placeholder: '마무리 제목' },
    { key: 'cta',   label: 'CTA 텍스트', type: 'textarea', placeholder: '예: AI 마케팅 무료 컨설팅\njack@popupstudio.ai' },
  ],
};

let cardCount = 0;
let generatedCards = [];

function addCard(data = null) {
  cardCount++;
  const id = cardCount;
  const type = data ? data.type : 'cover';
  const el = document.createElement('div');
  el.className = 'card-item';
  el.id = `card-item-${id}`;
  el.innerHTML = buildCardHTML(id, type, data);
  document.getElementById('cardsList').appendChild(el);
  if (!data) toggleCard(id); // 새 카드는 열린 상태
  updateCardNumbers();
}

function buildCardHTML(id, type, data) {
  const typeOptions = Object.keys(CARD_FIELDS).map(t =>
    `<option value="${t}" ${t === type ? 'selected' : ''}>${t}</option>`
  ).join('');

  const fields = CARD_FIELDS[type].map(f => buildField(id, f, data)).join('');

  return `
    <div class="card-header" onclick="toggleCard(${id})">
      <div class="card-num" id="card-num-${id}">1</div>
      <span class="card-type-badge" id="card-badge-${id}">${type}</span>
      <span class="card-title-preview" id="card-preview-${id}">${data ? (data.title || data.text || '') : ''}</span>
      <button class="card-del" onclick="removeCard(event, ${id})">×</button>
    </div>
    <div class="card-body" id="card-body-${id}">
      <div class="sub-group">
        <label>카드 타입</label>
        <select onchange="changeType(${id}, this.value)">${typeOptions}</select>
      </div>
      <div id="card-fields-${id}">${fields}</div>
    </div>
  `;
}

function buildField(id, field, data) {
  if (field.type === 'stats') {
    const stats = data && data.stats ? data.stats : [{ value: '', label: '', change: '' }];
    return `
      <div class="sub-group">
        <label>${field.label}</label>
        <div class="stat-rows" id="stat-rows-${id}">
          ${stats.map((s, i) => buildStatRow(id, i, s)).join('')}
        </div>
        <button class="btn-add-stat" onclick="addStatRow(${id})">+ 통계 추가</button>
      </div>`;
  }
  const val = data ? (data[field.key] || '') : '';
  const displayVal = Array.isArray(val) ? val.join('\n') : val;
  if (field.type === 'textarea') {
    return `<div class="sub-group">
      <label>${field.label}</label>
      <textarea data-key="${field.key}" placeholder="${field.placeholder}" oninput="updatePreview(${id})">${displayVal}</textarea>
    </div>`;
  }
  return `<div class="sub-group">
    <label>${field.label}</label>
    <input type="text" data-key="${field.key}" placeholder="${field.placeholder}" value="${displayVal}" oninput="updatePreview(${id})">
  </div>`;
}

function buildStatRow(cardId, rowIdx, s) {
  return `<div class="stat-row" id="stat-row-${cardId}-${rowIdx}">
    <input type="text" data-role="value" placeholder="수치 (예: 87%)" value="${s.value || ''}">
    <input type="text" data-role="label" placeholder="설명" value="${s.label || ''}">
    <input type="text" data-role="change" placeholder="변화 (예: +5%)" value="${s.change || ''}">
    <button class="del-stat" onclick="removeStatRow(event, ${cardId}, this)">×</button>
  </div>`;
}

function addStatRow(cardId) {
  const rows = document.getElementById(`stat-rows-${cardId}`);
  const idx = rows.children.length;
  rows.insertAdjacentHTML('beforeend', buildStatRow(cardId, idx, {}));
}

function removeStatRow(e, cardId, btn) {
  e.stopPropagation();
  const row = btn.closest('.stat-row');
  row.remove();
}

function changeType(id, type) {
  document.getElementById(`card-badge-${id}`).textContent = type;
  const fieldsEl = document.getElementById(`card-fields-${id}`);
  fieldsEl.innerHTML = CARD_FIELDS[type].map(f => buildField(id, f, null)).join('');
}

function toggleCard(id) {
  const body = document.getElementById(`card-body-${id}`);
  body.classList.toggle('open');
}

function removeCard(e, id) {
  e.stopPropagation();
  document.getElementById(`card-item-${id}`).remove();
  updateCardNumbers();
}

function updateCardNumbers() {
  const items = document.querySelectorAll('.card-item');
  items.forEach((item, i) => {
    const id = item.id.replace('card-item-', '');
    const numEl = document.getElementById(`card-num-${id}`);
    if (numEl) numEl.textContent = i + 1;
  });
}

function updatePreview(id) {
  const titleEl = document.querySelector(`#card-fields-${id} [data-key="title"]`);
  const textEl = document.querySelector(`#card-fields-${id} [data-key="text"]`);
  const preview = document.getElementById(`card-preview-${id}`);
  if (preview) preview.textContent = (titleEl || textEl) ? (titleEl || textEl).value : '';
}

function getCardData(item) {
  const id = item.id.replace('card-item-', '');
  const typeSelect = item.querySelector('select');
  const type = typeSelect ? typeSelect.value : 'cover';
  const data = { type };

  item.querySelectorAll('[data-key]').forEach(el => {
    const key = el.dataset.key;
    const val = el.value.trim();
    if (key === 'tags') {
      data[key] = val ? val.split(',').map(t => t.trim()).filter(Boolean) : [];
    } else if (key === 'points' || key === 'items') {
      data[key] = val ? val.split('\n').map(t => t.trim()).filter(Boolean) : [];
    } else {
      data[key] = val;
    }
  });

  // stat 처리
  const statRows = item.querySelectorAll('.stat-row');
  if (statRows.length) {
    data.stats = Array.from(statRows).map(row => ({
      value: row.querySelector('[data-role="value"]').value.trim(),
      label: row.querySelector('[data-role="label"]').value.trim(),
      change: row.querySelector('[data-role="change"]').value.trim(),
    }));
  }

  return data;
}

async function generate() {
  const cards = Array.from(document.querySelectorAll('.card-item')).map(getCardData);
  if (!cards.length) { alert('카드를 하나 이상 추가하세요.'); return; }

  const payload = {
    title: document.getElementById('title').value.trim(),
    theme: document.getElementById('theme').value,
    brand: document.getElementById('brand').value.trim(),
    cards,
  };

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('previewGrid').innerHTML = '';
  document.getElementById('loading').classList.add('active');
  document.getElementById('btnGenerate').disabled = true;
  document.getElementById('btnDownload').classList.remove('visible');
  document.getElementById('resultCount').textContent = '';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const json = await res.json();

    if (!res.ok) { alert(json.error || '오류가 발생했습니다.'); return; }

    generatedCards = json.cards;
    const grid = document.getElementById('previewGrid');
    generatedCards.forEach(card => {
      const div = document.createElement('div');
      div.className = 'preview-card';
      div.innerHTML = `<img src="data:image/png;base64,${card.data}" alt="${card.filename}">
        <div class="preview-card-label">${card.filename}</div>`;
      grid.appendChild(div);
    });

    document.getElementById('resultCount').textContent = `${generatedCards.length}장 생성됨`;
    document.getElementById('btnDownload').classList.add('visible');
  } catch (err) {
    alert('서버 오류: ' + err.message);
  } finally {
    document.getElementById('loading').classList.remove('active');
    document.getElementById('btnGenerate').disabled = false;
  }
}

async function downloadZip() {
  if (!generatedCards.length) return;
  const zip = new JSZip();
  const title = document.getElementById('title').value.trim() || 'card-news';
  generatedCards.forEach(card => {
    const bytes = atob(card.data);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    zip.file(card.filename, arr);
  });
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${title}.zip`;
  a.click();
}

// 예제 카드 데이터로 초기화
const EXAMPLE = [
  { type: 'cover', series: 'MARKETING TREND 2026', title: 'AI가 바꾸는\n콘텐츠 마케팅', subtitle: '당신의 마케팅이 달라져야 하는 이유' },
  { type: 'content', title: 'AI 마케팅이란?', tags: ['AI', '마케팅'], body: '인공지능이 콘텐츠 기획부터 배포까지 전 과정을 혁신하고 있습니다.', points: ['데이터 기반 타겟팅', '자동화된 콘텐츠 생성', '실시간 성과 최적화'] },
  { type: 'stat', title: 'AI 마케팅 현황 2026', stats: [{ value: '87%', label: '기업 도입률', change: '+23%' }, { value: '3.2x', label: 'ROI 증가', change: '' }, { value: '80%', label: '제작 시간 단축', change: '' }, { value: '45%', label: '비용 절감', change: '' }] },
